apiVersion: holodeck.nvidia.com/v1alpha1
kind: Environment
metadata:
  name: holodeck-rpm-fedora42-crio
  description: "RPM E2E: Fedora 42 + CRI-O + full GPU stack"
spec:
  provider: aws
  auth:
    keyName: cnt-ci
    privateKey: /home/runner/.cache/key
  instance:
    type: g4dn.xlarge
    region: us-west-1
    os: fedora-42
    image:
      architecture: amd64
  containerRuntime:
    install: true
    name: crio
  nvidiaContainerToolkit:
    install: true
  nvidiaDriver:
    install: true
  kubernetes:
    install: true
    installer: kubeadm
