name: E2E Full Tests

on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SSH_KEY:
        required: true

permissions:
  issues: write

jobs:
  e2e-mock:
    runs-on: linux-amd64-cpu4
    name: E2E Mock

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install Go
      uses: actions/setup-go@v7
      with:
        go-version: 'stable'
        check-latest: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make

    - name: Run mock e2e test
      env:
        LOG_ARTIFACT_DIR: e2e_logs
      run: |
        make -f tests/Makefile test GINKGO_ARGS="--label-filter='mock' --json-report ginkgo.json"

    - name: Archive Ginkgo logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ginkgo-mock-full-logs
        path: ginkgo.json
        retention-days: 15

  e2e-real-full:
    runs-on: linux-amd64-cpu4
    name: E2E Real Full

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install Go
      uses: actions/setup-go@v7
      with:
        go-version: 'stable'
        check-latest: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make

    - name: Run e2e test
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        LOG_ARTIFACT_DIR: e2e_logs
      run: |
        e2e_ssh_key=$(mktemp)
        echo "${{ secrets.AWS_SSH_KEY }}" > "$e2e_ssh_key"
        chmod 600 "$e2e_ssh_key"
        export E2E_SSH_KEY="$e2e_ssh_key"
        make -f tests/Makefile test GINKGO_ARGS="--label-filter='real-aws && cluster && minimal' --json-report ginkgo.json --timeout=90m"

    - name: Archive Ginkgo logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ginkgo-full-logs
        path: ginkgo.json
        retention-days: 15

  create-issue:
    runs-on: ubuntu-latest
    needs: [e2e-mock, e2e-real-full]
    if: failure()
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Create or update failure issue
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        SHA_SHORT="${GITHUB_SHA:0:8}"
        TITLE="E2E failure on ${SHA_SHORT}"
        BODY=$(cat <<EOF
        ## E2E Post-merge Failure

        **Commit:** ${GITHUB_SHA}
        **Actor:** ${GITHUB_ACTOR}
        **Branch:** ${GITHUB_REF_NAME}
        **Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

        Check the workflow run for details on which test(s) failed.
        EOF
        )

        # Check for existing open issue
        EXISTING=$(gh issue list --label e2e-failure --label automated --state open --json number --jq '.[0].number // empty')

        if [ -n "$EXISTING" ]; then
          echo "Adding comment to existing issue #${EXISTING}"
          gh issue comment "$EXISTING" --body "$BODY"
        else
          echo "Creating new issue"
          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label "e2e-failure" \
            --label "automated"
        fi
