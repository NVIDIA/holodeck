name: E2E Smoke Tests

on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SSH_KEY:
        required: true

jobs:
  e2e-mock:
    runs-on: linux-amd64-cpu4
    name: E2E Mock

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install Go
      uses: actions/setup-go@v7
      with:
        go-version: 'stable'
        check-latest: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make

    - name: Run mock e2e test
      env:
        LOG_ARTIFACT_DIR: e2e_logs
      run: |
        make -f tests/Makefile test GINKGO_ARGS="--label-filter='mock' --json-report ginkgo.json"

    - name: Archive Ginkgo logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ginkgo-mock-logs
        path: ginkgo.json
        retention-days: 15

  e2e-real-smoke:
    runs-on: linux-amd64-cpu4
    name: E2E Real Smoke

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install Go
      uses: actions/setup-go@v7
      with:
        go-version: 'stable'
        check-latest: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make

    - name: Run smoke e2e test
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        LOG_ARTIFACT_DIR: e2e_logs
      run: |
        e2e_ssh_key=$(mktemp)
        echo "${{ secrets.AWS_SSH_KEY }}" > "$e2e_ssh_key"
        chmod 600 "$e2e_ssh_key"
        export E2E_SSH_KEY="$e2e_ssh_key"
        make -f tests/Makefile test GINKGO_ARGS="--label-filter='real-aws && default && !rpm' --json-report ginkgo.json"

    - name: Archive Ginkgo logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ginkgo-smoke-logs
        path: ginkgo.json
        retention-days: 15

  e2e-real-ssh:
    runs-on: linux-amd64-cpu4
    name: E2E Real SSH

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install Go
      uses: actions/setup-go@v7
      with:
        go-version: 'stable'
        check-latest: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make

    # Fail loudly and early if the runner has no docker daemon, rather than
    # deep inside Ginkgo. runner-docker-availability on linux-amd64-cpu4 is
    # UNCONFIRMED; this probe surfaces it on the first CI run.
    - name: Verify docker is available
      run: docker info

    - name: Run real-ssh e2e test
      env:
        LOG_ARTIFACT_DIR: e2e_logs
      run: |
        make -f tests/Makefile test GINKGO_ARGS="--label-filter='real-ssh' --json-report ginkgo.json"

    - name: Archive Ginkgo logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ginkgo-real-ssh-logs
        path: ginkgo.json
        retention-days: 15
