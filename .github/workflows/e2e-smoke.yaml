name: E2E Smoke Tests

on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SSH_KEY:
        required: true

jobs:
  e2e-smoke:
    runs-on: linux-amd64-cpu4
    strategy:
      fail-fast: false
      matrix:
        label: ["default && !rpm", "cluster && minimal", "nvidia-driver"]
    name: E2E Smoke (${{ matrix.label }})

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        check-latest: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make

    - name: Run smoke e2e test for ${{ matrix.label }}
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        LOG_ARTIFACT_DIR: e2e_logs
      run: |
        e2e_ssh_key=$(mktemp)
        echo "${{ secrets.AWS_SSH_KEY }}" > "$e2e_ssh_key"
        chmod 600 "$e2e_ssh_key"
        export E2E_SSH_KEY="$e2e_ssh_key"
        make -f tests/Makefile test GINKGO_ARGS="--label-filter='${{ matrix.label }}' --json-report ginkgo.json"

    - name: Archive Ginkgo logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ginkgo-smoke-logs-${{ strategy.job-index }}
        path: ginkgo.json
        retention-days: 15
