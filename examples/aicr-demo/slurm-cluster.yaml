# Slinky Slurm Cluster for the AICR integration demo. See:
# docs/guides/aicr-integration.md (Phase 2.2)
# docs/superpowers/specs/2026-05-14-holodeck-aicr-demo-design.md (Artifact 2)
#
# Operator: slinky-slurm-operator chart v1.1.0 (pinned by AICR).
# Single-node Slurm cluster sized for a 1x L40S worker. Adjust
# replicas + resources for multi-node clusters.
#
# Schema verified from:
#   https://github.com/SlinkyProject/slurm-operator @ tag v1.1.0
#   helm/slurm/templates/controller/controller-cr.yaml
#   helm/slurm/templates/nodeset/nodeset-cr.yaml
#   helm/slurm/templates/_slurm.tpl  (auth secret naming)
#   config/crd/bases/slinky.slurm.net_controllers.yaml
#   config/crd/bases/slinky.slurm.net_nodesets.yaml
#
# NOTE: apiVersion is slinky.slurm.net/v1beta1 (not v1alpha1 — the operator
# graduated to v1beta1 before v1.0.0).
#
# PREREQUISITES: the slinky-slurm-operator Helm chart must be installed in the
# `slinky` namespace.  The chart auto-creates two Secrets in the `slurm`
# namespace that this Controller references:
#   <release>-auth-slurm  (key: slurm.key)  — shared Munge auth key
#   <release>-auth-jwt    (key: jwt.key)     — slurmrestd JWT signing key
# With a release name of "slurm" (the AICR demo default) these become
# slurm-auth-slurm and slurm-auth-jwt.  If you chose a different release
# name, update slurmKeyRef.name and jwtKeyRef.name below.
---
apiVersion: slinky.slurm.net/v1beta1
kind: Controller
metadata:
  name: slurm
  namespace: slurm
spec:
  # clusterName is optional; if omitted the operator derives it from
  # the Controller object name.  Set it explicitly for visibility.
  clusterName: aicr-demo

  # Auth secrets are created by the Helm chart (slurmKey.create: true is
  # the default).  Names follow the pattern <release>-auth-{slurm,jwt}.
  slurmKeyRef:
    name: slurm-auth-slurm
    key: slurm.key
  jwtKeyRef:
    name: slurm-auth-jwt
    key: jwt.key

  # slurmctld container — the primary Slurm controller daemon.
  # Image tag matches the AICR-pinned chart version (appVersion 25.11).
  slurmctld:
    image:
      repository: ghcr.io/slinkyproject/slurmctld
      tag: 25.11-ubuntu24.04
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

  # reconfigure sidecar — handles in-place slurm.conf reconfiguration.
  reconfigure:
    image:
      repository: ghcr.io/slinkyproject/slurmctld
      tag: 25.11-ubuntu24.04
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  # logfile sidecar — tails slurm logs to stdout.
  logfile:
    image:
      repository: docker.io/library/alpine
      tag: "3.20"
    resources:
      requests:
        cpu: 10m
        memory: 32Mi


---
apiVersion: slinky.slurm.net/v1beta1
kind: NodeSet
metadata:
  name: slurm-worker-gpu
  namespace: slurm
spec:
  # Link this NodeSet to the Controller above.
  controllerRef:
    name: slurm
    namespace: slurm

  replicas: 1

  # slurmd container — the Slurm worker daemon running on each node pod.
  slurmd:
    image:
      repository: ghcr.io/slinkyproject/slurmd
      tag: 25.11-ubuntu24.04
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        # Expose the L40S GPU to Slurm jobs running inside this pod.
        nvidia.com/gpu: "1"
      limits:
        nvidia.com/gpu: "1"

  # logfile sidecar.
  logfile:
    image:
      repository: docker.io/library/alpine
      tag: "3.20"
    resources:
      requests:
        cpu: 10m
        memory: 32Mi

  # Pod-level spec: tolerate any taint so the NodeSet pod lands on the
  # (potentially tainted) GPU node in a single-node holodeck cluster.
  template:
    spec:
      tolerations:
        - operator: Exists

  # NodeSet operational settings.
  scalingMode: StatefulSet
  ordinalPadding: 0
  taintKubeNodes: false
  workloadDisruptionProtection: true

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
